# Security Boundary Template (Security Diagram Source)
#
# WARNING: This file contains security boundary definitions.
# It uses _sync_policy: "never-sync" and will NOT be propagated to consumer projects.
#
# Getting started:
#   1. Run `node .claude/scripts/docs-scaffold-diagrams.mjs` to generate a stub
#      with the schema_version header and minimal valid structure.
#   2. Or fill in this template manually with your project's security zones.
#   3. Run `node .claude/scripts/docs-validate.mjs` to check for issues.
