# Deployment Topology Template (Deployment Diagram Source)
#
# Getting started:
#   1. Run `node .claude/scripts/docs-scaffold-diagrams.mjs` to generate a stub
#      with the schema_version header and minimal valid structure.
#   2. Or fill in this template manually with your project's deployment topology.
#   3. Run `node .claude/scripts/docs-validate.mjs` to check for issues.
#   4. Run `node .claude/scripts/docs-generate.mjs` to create Mermaid deployment diagrams.
#
# Each node defines an infrastructure element (server, container, database, CDN).
# Connections describe how nodes communicate.
# The generator produces a flowchart LR from this source.
#
